<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진로 나침반</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1F2A24; --ink-soft:#4B564E;
    --paper:#E9EDE4; --paper-raised:#F7F8F3;
    --accent:#2B5F6B; --accent-soft:rgba(43,95,107,0.13);
    --line:rgba(31,42,36,0.16); --line-strong:rgba(31,42,36,0.32);
    --r:#8A6D3B; --i:#2B5F6B; --a:#8E4585; --s:#B0473E; --e:#C98A2B; --c:#3D6B4A;
    --radius:16px;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--font-body); background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased;}
  #root{max-width:940px;margin:0 auto;padding:28px 20px 80px;}
  h1,h2,h3{font-family:var(--font-display);margin:0;}
  button{font-family:var(--font-body);cursor:pointer;}
  input,select,textarea{font-family:var(--font-body);}
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, [tabindex]:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .hero{background:var(--ink); color:var(--paper-raised); border-radius:var(--radius); padding:40px 32px; margin-bottom:24px; position:relative; overflow:hidden;}
  .hero-eyebrow{font-family:var(--font-mono); font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#9FB3A4; margin-bottom:14px;}
  .school-badge{font-family:var(--font-display); font-size:14.5px; font-weight:600; color:var(--paper-raised); letter-spacing:0.02em; margin-bottom:8px;}
  .hero h1{font-size:34px; font-weight:600; line-height:1.15; letter-spacing:-0.01em;}
  .hero p{font-size:15px; line-height:1.6; color:#C7D2C6; max-width:520px; margin-top:12px;}
  .compass-mark{position:absolute; right:-30px; top:-30px; width:200px; height:200px; opacity:0.16;}
  .demo-link{display:inline-block;margin-top:14px;font-size:13px;color:var(--ink-soft);text-decoration:underline;text-underline-offset:3px;background:none;border:none;padding:0;}

  .card{background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); padding:24px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
  .field .hint{font-size:12px;color:var(--ink-soft);font-weight:400;margin-top:4px;}
  .field input[type=text], .field input[type=password], .field select, .field textarea{width:100%; padding:11px 13px; border:1px solid var(--line-strong); border-radius:10px; background:#fff; font-size:14px; color:var(--ink);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:560px){.row2{grid-template-columns:1fr;}}

  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:10px; padding:12px 20px; font-size:14px; font-weight:600; letter-spacing:0.01em; background:var(--accent); color:#fff; transition:transform .12s ease, opacity .12s ease;}
  .btn:hover{opacity:0.92;} .btn:active{transform:scale(0.98);} .btn:disabled{opacity:0.45;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line-strong);}
  .btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px;}
  .btn-danger-ghost{background:transparent;color:#8A3A32;border:1px solid rgba(138,58,50,0.35);}

  .disclosure{font-size:12px; line-height:1.6; color:var(--ink-soft); background:var(--accent-soft); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-top:18px;}

  .topbar{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; flex-wrap:wrap;}
  .who{display:flex; align-items:center; gap:10px;}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--ink);color:var(--paper-raised); display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:15px;}
  .who-name{font-weight:600;font-size:15px;}
  .who-id{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);}

  .tabs{display:flex; gap:6px; background:var(--paper-raised); border:1px solid var(--line); border-radius:12px; padding:5px; margin-bottom:20px; flex-wrap:wrap;}
  .tab-btn{flex:1; min-width:110px; background:transparent; border:none; border-radius:8px; padding:10px 12px; font-size:13.5px; font-weight:600; color:var(--ink-soft);}
  .tab-btn.active{background:var(--ink); color:var(--paper-raised);}

  .section-title{font-size:20px; font-weight:600; margin-bottom:4px;}
  .section-desc{font-size:13.5px; color:var(--ink-soft); margin-bottom:18px; line-height:1.55;}
  .empty{text-align:center; padding:36px 20px; color:var(--ink-soft); font-size:13.5px; line-height:1.6;}

  /* ---- test / likert ---- */
  .test-meta{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:20px;}
  .test-meta .field{flex:1;min-width:160px;margin-bottom:0;}
  .cat-block{margin-bottom:22px; padding-top:18px; border-top:1px solid var(--line);}
  .cat-block:first-of-type{border-top:none;padding-top:0;}
  .cat-head{display:flex; align-items:center; gap:8px; margin-bottom:12px;}
  .cat-head .dot{width:11px;height:11px;border-radius:50%;}
  .cat-head b{font-size:14.5px;}
  .cat-head span{font-size:12px;color:var(--ink-soft);}
  .likert-row, .subj-row{display:flex; align-items:center; justify-content:space-between; gap:14px; padding:10px 0; border-bottom:1px dashed var(--line);}
  .likert-row:last-child, .subj-row:last-child{border-bottom:none;}
  .subject-bars{display:flex; flex-direction:column; gap:8px; margin-top:10px;}
  .subject-bar-row{display:flex; align-items:center; gap:10px;}
  .subject-bar-label{font-size:12.5px; font-weight:600; width:74px; flex-shrink:0;}
  .subject-bar-track{flex:1; height:8px; background:var(--line); border-radius:6px; overflow:hidden;}
  .subject-bar-fill{height:100%; border-radius:6px; background:var(--ink);}
  .subject-bar-score{font-family:var(--font-mono); font-size:11.5px; width:16px; text-align:right; color:var(--ink-soft);}
  .likert-q{font-size:13.5px; line-height:1.5; flex:1;}
  .likert-scale{display:flex; gap:6px; flex-shrink:0;}
  .likert-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--line-strong);background:#fff;font-family:var(--font-mono);font-size:12.5px;font-weight:600;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;}
  .likert-btn.selected{background:var(--ink); color:var(--paper-raised); border-color:var(--ink);}
  .likert-caption{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-soft);margin-top:4px;}
  .submit-row{position:sticky; bottom:0; background:var(--paper-raised); padding-top:16px; margin-top:6px; border-top:1px solid var(--line);}
  .progress-note{font-size:12.5px;color:var(--ink-soft);margin-bottom:8px;}

  /* ---- progress / radar ---- */
  .snap-chips{display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; overflow-x:auto;}
  .snap-chips button{background:#fff; border:1.5px solid var(--line-strong); border-radius:20px; padding:7px 13px; font-size:12px; font-weight:600; color:var(--ink-soft); white-space:nowrap;}
  .snap-chips button.active{background:var(--ink); color:var(--paper-raised); border-color:var(--ink);}
  .radar-wrap{display:flex; gap:28px; flex-wrap:wrap; align-items:center;}
  .radar-svg{flex:0 0 auto;}
  .legend{flex:1; min-width:220px; display:flex; flex-direction:column; gap:10px;}
  .legend-row{display:flex; align-items:center; gap:10px;}
  .legend-row .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
  .legend-label{font-size:13px; font-weight:600; width:56px; flex-shrink:0;}
  .legend-label-wide{width:78px !important;}
  .legend-bar-track{flex:1; height:8px; background:var(--line); border-radius:6px; overflow:hidden;}
  .legend-bar-fill{height:100%; border-radius:6px;}
  .legend-score{font-family:var(--font-mono); font-size:12px; width:26px; text-align:right; color:var(--ink-soft);}
  .highlight-box{margin-top:22px; background:var(--accent-soft); border:1px solid var(--line); border-radius:12px; padding:16px 18px; font-size:13.5px; line-height:1.6;}
  .delta-box{margin-top:14px; border:1px solid var(--line); border-radius:12px; padding:14px 16px; font-size:13px; line-height:1.7; background:#fff;}
  .delta-tag{font-family:var(--font-mono); font-size:11.5px; font-weight:700; padding:2px 7px; border-radius:6px; background:var(--paper); margin-right:4px;}
  .trend-scroll{overflow-x:auto; padding-bottom:6px;}
  .trend-legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:10px;}
  .trend-legend span{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-soft);}
  .trend-legend .dot{width:9px;height:9px;border-radius:50%;}

  /* ---- analysis ---- */
  .type-icon{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
  .type-icon svg{width:85%;height:85%;display:block;}
  .type-row{display:flex; gap:7px; overflow-x:auto; padding:14px 2px 6px; margin:-14px 0 22px;}
  @media (min-width:640px){ .type-row{ justify-content:center; } }
  .type-card{flex:0 0 88px; border:1.5px solid var(--line); border-radius:10px; padding:9px 6px; text-align:center; background:#fff; position:relative;}
  .type-card.rank1{border-color:var(--ink); box-shadow:0 0 0 1.5px var(--ink);}
  .type-card.rank2{border-color:var(--accent); box-shadow:0 0 0 1.5px var(--accent);}
  .rank-ribbon{position:absolute; top:-8px; left:50%; transform:translateX(-50%); font-family:var(--font-mono); font-size:8.5px; font-weight:700; padding:1px 6px; border-radius:10px; background:var(--ink); color:var(--paper-raised); white-space:nowrap;}
  .type-card.rank2 .rank-ribbon{background:var(--accent);}
  .type-card .type-icon{width:22px;height:22px;margin:2px auto 6px;}
  .type-card .code-line{font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--ink-soft);}
  .type-card .label-line{font-size:12px; font-weight:700; margin-top:1px;}
  .job-cols{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:6px;}
  @media (max-width:640px){.job-cols{grid-template-columns:1fr;}}
  .job-col{border:1px solid var(--line); border-radius:12px; padding:16px; background:#fff;}
  .job-col-head{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .job-col-head .rank-num{width:22px;height:22px;border-radius:50%;background:var(--ink);color:var(--paper-raised);font-family:var(--font-mono);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .job-col-head.rank2 .rank-num{background:var(--accent);}
  .job-col h3{font-size:14.5px;}
  .job-col .field-tag{font-size:11.5px; color:var(--ink-soft);}
  .job-col .group-label{font-size:11px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.03em; margin:12px 0 6px;}
  .job-col .group-label:first-of-type{margin-top:4px;}
  .chip-static{display:inline-block; background:var(--paper); font-size:11.5px; padding:3px 9px; border-radius:20px; margin:0 5px 5px 0; color:var(--ink);}
  .more-toggle{background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;padding:4px 0;text-decoration:underline;text-underline-offset:2px;}
  .hidden{display:none;}
  .adiga-note{font-size:11.5px; color:var(--ink-soft); margin-top:16px; line-height:1.6;}
  .suggestion-card{display:flex; gap:14px; align-items:flex-start; background:var(--accent-soft); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin-bottom:18px;}
  .suggestion-tag{font-family:var(--font-mono); font-size:11px; font-weight:700; background:var(--ink); color:var(--paper-raised); padding:3px 8px; border-radius:6px; flex-shrink:0; margin-top:2px;}
  .candidates-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; margin-top:16px;}
  .candidate-card{border:1px solid var(--line); border-radius:12px; padding:16px; background:#fff;}
  .candidate-card h3{font-size:15px; margin-bottom:8px;}
  .candidate-card p{font-size:12.5px; color:var(--ink-soft); line-height:1.55; margin:6px 0;}
  .candidate-card .kicker{font-family:var(--font-mono); font-size:10.5px; color:var(--accent); font-weight:700; letter-spacing:0.03em; text-transform:uppercase;}
  .pill-row{display:flex; flex-wrap:wrap; gap:5px; margin-top:6px;}
  .pill-row span{background:var(--paper); font-size:11px; padding:3px 8px; border-radius:20px; color:var(--ink);}
  .encourage-box{margin-top:18px; border-left:3px solid var(--accent); padding:12px 16px; font-size:13px; line-height:1.6; color:var(--ink-soft); background:var(--paper-raised);}
  .spinner{width:18px;height:18px;border-radius:50%;border:2px solid var(--line-strong); border-top-color:var(--accent); animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-row{display:flex; align-items:center; gap:10px; font-size:13.5px; color:var(--ink-soft); padding:20px 0;}
  .error-banner{background:#F7EAE8; border:1px solid rgba(138,58,50,0.3); color:#8A3A32; border-radius:10px; padding:12px 14px; font-size:13px; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; gap:10px;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-soft); padding:8px 10px; border-bottom:1.5px solid var(--line-strong);}
  td{padding:10px 10px; border-bottom:1px solid var(--line);}
  .code-badge{font-family:var(--font-mono); font-weight:700; background:var(--ink); color:var(--paper-raised); padding:2px 7px; border-radius:6px; font-size:11px;}
  .count-tag{font-size:11.5px; color:var(--ink-soft);}
  .type-cols-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:16px;}
  .type-col{border:1px solid var(--line); border-radius:14px; padding:20px; background:#fff;}
  .type-col-head{display:flex; align-items:flex-start; gap:12px; margin-bottom:16px;}
  .type-col-head .type-icon{width:44px;height:44px;}
  .type-col-head h3{font-size:17px;}
  .type-col-head .count-tag{font-size:13px;}
  .type-col-list{display:flex; flex-direction:column; gap:8px;}
  .student-chip{display:flex; justify-content:space-between; align-items:center; width:100%; text-align:left; background:var(--paper); border:none; border-radius:10px; padding:11px 14px; font-size:14.5px; font-weight:600; color:var(--ink); cursor:pointer;}
  .student-chip:hover{background:var(--accent-soft);}
  .student-chip-sub{color:var(--ink-soft); font-family:var(--font-mono); font-size:11px; font-weight:500; margin-left:8px; flex-shrink:0;}
  .change-badge{font-family:var(--font-mono); font-size:10px; font-weight:700; background:var(--accent); color:#fff; padding:2px 7px; border-radius:8px; margin-left:8px; flex-shrink:0;}
  .footer-note{font-size:11.5px; color:var(--ink-soft); text-align:center; margin-top:36px; line-height:1.7;}

  @media print{
    .no-print{ display:none !important; }
    body{ background:#fff; }
    #root{ max-width:100%; padding:0; }
    .card{ border:none; padding:0; }
  }
  .print-only{ display:none; }
  .print-header{ margin-bottom:20px; }
  .print-header .print-school{ font-family:var(--font-display); font-weight:700; font-size:15px; }
  .print-header .print-title{ font-family:var(--font-display); font-weight:600; font-size:22px; margin-top:2px; }
  .print-header .print-meta{ font-size:12.5px; color:var(--ink-soft); margin-top:4px; }
  .print-divider{ border:none; border-top:1px solid var(--line-strong); margin:26px 0; }
  @media print{
    .print-only{ display:block !important; }
    #tab-content{ display:none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
/* ============ Backend config ============ */
/* 배포 후 나오는 Apps Script 웹 앱 URL을 아래에 붙여넣으세요. (설정 가이드 참고) */
const API_URL = 'https://script.google.com/macros/s/AKfycbxENTg-ZnBWzw4iPLxIa989nmS3Nx0t7lF6HfPMJ35Wd5_fv4Z9tSb8XszpwcGYoHk1/exec';
const API_CONFIGURED = API_URL.indexOf('PASTE_') === -1;

async function apiCall(action, payload){
  if(!API_CONFIGURED) return {ok:false, error:'아직 백엔드 주소가 연결되지 않았어요. 설정 가이드를 먼저 완료해주세요.'};
  try{
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(Object.assign({action}, payload))
    });
    return await res.json();
  } catch(err){
    console.error('API error', err);
    return {ok:false, error:'서버에 연결하지 못했어요. 잠시 후 다시 시도해주세요.'};
  }
}

/* ============ Constants ============ */
const ORDER = ['R','I','A','S','E','C'];
const CATS = [
  {code:'R', label:'현실형', desc:'몸으로 만들고 움직이기', hex:'#8A6D3B'},
  {code:'I', label:'탐구형', desc:'질문하고 파고들기', hex:'#2B5F6B'},
  {code:'A', label:'예술형', desc:'새롭게 표현하고 창작하기', hex:'#8E4585'},
  {code:'S', label:'사회형', desc:'돕고 함께하기', hex:'#B0473E'},
  {code:'E', label:'기업형', desc:'이끌고 설득하기', hex:'#C98A2B'},
  {code:'C', label:'관습형', desc:'체계적으로 정리하기', hex:'#3D6B4A'}
];
const QUESTIONS = [
  {code:'R', text:'새로운 도구나 기계가 어떻게 작동하는지 직접 만져보며 알아보는 게 좋다.'},
  {code:'R', text:'손으로 무언가를 조립하거나 고치는 활동을 하면 시간 가는 줄 모른다.'},
  {code:'R', text:'몸을 움직이는 활동(운동, 실습, 야외 활동)을 할 때 에너지가 난다.'},
  {code:'R', text:'이론으로 배우기보다 직접 해보면서 익히는 게 더 잘 맞는다.'},
  {code:'R', text:'완성된 물건보다 그것을 만드는 과정 자체에 흥미를 느낀다.'},
  {code:'R', text:'캠핑, 목공, 요리처럼 손과 몸을 함께 쓰는 활동을 즐긴다.'},
  {code:'R', text:'기계나 장비를 다루는 일을 맡으면 자신 있게 해낸다.'},
  {code:'R', text:'실외에서 몸을 쓰며 하는 활동이 실내에서 앉아 하는 활동보다 좋다.'},
  {code:'R', text:'물건이 고장 났을 때 원인을 찾아 직접 고쳐보고 싶어진다.'},
  {code:'R', text:'정교한 손기술이 필요한 활동(만들기, 조립, 수리)에 흥미가 있다.'},
  {code:'I', text:'궁금한 것이 생기면 끝까지 답을 찾아보고 싶어진다.'},
  {code:'I', text:'실험이나 관찰을 통해 원리를 확인하는 과정이 흥미롭다.'},
  {code:'I', text:'복잡한 문제를 논리적으로 하나씩 풀어가는 게 재미있다.'},
  {code:'I', text:'새로운 지식이나 정보를 스스로 찾아보는 걸 즐긴다.'},

function pairKey(a,b){ return [a,b].sort((x,y)=>ORDER.indexOf(x)-ORDER.indexOf(y)).join(''); }
function esc(str){ return String(str==null?'':str).replace(/[&<>"']/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
function fmtDate(iso){ const d=new Date(iso); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }
function topTwoCodes(scores){
  const arr = ORDER.map(c=>[c,scores[c]]).sort((a,b)=>b[1]-a[1]);
  if(arr[0][1]===0) return null;
  return [arr[0][0], arr[1][0]];
}
function labelOf(code){ const c=CATS.find(x=>x.code===code); return c?`${c.label}(${c.code})`:code; }

async function startStudentSession(){
  const btn = document.getElementById('start-btn');
  const name = (document.getElementById('in-name').value||'').trim();
  const pw = document.getElementById('in-pw').value;
  if(!name || !pw){ alert('이름과 비밀번호를 모두 입력해주세요.'); return; }
  btn.disabled=true; btn.textContent='확인하는 중…';
  const authRes = await apiCall('auth', {name, password:pw});
  if(!authRes.ok){ alert(authRes.error || '로그인에 실패했어요.'); btn.disabled=false; btn.textContent='시작하기'; return; }
  state.isDemo=false; state.studentName=name; state.studentPassword=pw;
  const [histRes, anaRes] = await Promise.all([
    apiCall('getHistory', {name, password:pw}),
    apiCall('getAnalysis', {name, password:pw}),
  ]);
  state.history = histRes.ok ? histRes.history : [];
  state.analysis = anaRes.ok ? anaRes.analysis : null;
  state.viewIndex = Math.max(0, state.history.length-1);
  state.mode='student'; state.tab = state.history.length ? 'progress' : 'test';
  render();
}

      ${note}
      <div class="test-meta">
        <div class="field"><label for="test-grade">학년</label><select id="test-grade"><option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option></select></div>

      </div>

      ${subjectBlock()}

function subjectBlock(){
  const rows = SUBJECTS.map((name,i)=>{
    const btns = [1,2,3,4,5].map(v=>`<button type="button" class="likert-btn ${subjectAnswers[i]===v?'selected':''}" onclick="setSubjectAnswer(${i},${v})">${v}</button>`).join('');
    return `<div class="subj-row"><div class="likert-q">${esc(name)}</div><div class="likert-scale">${btns}</div></div>`;
  }).join('');
  return `
    <div class="cat-block">
      <div class="cat-head"><span class="dot" style="background:var(--ink)"></span><b>좋아하는 과목</b><span>· 요즘 배우는 과목에 대한 흥미도</span></div>

function setSubjectAnswer(i,v){
  subjectAnswers[i]=v;
  const rows = document.querySelectorAll('.subj-row');
  const row = rows[i];
  if(!row){ render(); return; }
  row.querySelectorAll('.likert-btn').forEach((b,idx)=>{ b.classList.toggle('selected', idx+1===v); });
}
function setAnswer(i,v){
  testAnswers[i]=v;
  const rows = document.querySelectorAll('.likert-row');
  const row = rows[i];
  if(!row){ render(); return; }
  row.querySelectorAll('.likert-btn').forEach((b,idx)=>{ b.classList.toggle('selected', idx+1===v); });
}
async function submitTest(){
  const unanswered = testAnswers.filter(v=>v===0).length;
  const subjUnanswered = subjectAnswers.filter(v=>v===0).length;
  if(unanswered>0){ alert(`아직 답하지 않은 성향 문항이 ${unanswered}개 있어요.`); return; }
  if(subjUnanswered>0){ alert(`아직 흥미도를 매기지 않은 과목이 ${subjUnanswered}개 있어요.`); return; }
  const grade = Number(document.getElementById('test-grade').value);
  const classSection = document.getElementById('test-section').value.trim();
  const label = document.getElementById('test-label').value.trim();
  const scores = {R:0,I:0,A:0,S:0,E:0,C:0};
  QUESTIONS.forEach((q,i)=>{ scores[q.code]+=testAnswers[i]; });
  const subjects = {};
  SUBJECTS.forEach((name,i)=>{ subjects[name]=subjectAnswers[i]; });

  const btn = document.getElementById('submit-test-btn');
  if(btn){ btn.disabled=true; btn.textContent='저장하는 중…'; }

  if(!state.isDemo){
    const res = await apiCall('saveTest', {name:state.studentName, password:state.studentPassword, grade, classSection, label, scores, subjects});
    if(!res.ok){
      alert(res.error || '저장에 실패했어요. 다시 시도해주세요.');
      if(btn){ btn.disabled=false; btn.textContent='검사 제출하고 저장하기'; }
      return;
    }
  }
  const snapshot = {date:new Date().toISOString(), grade, classSection, label, scores, subjects};
  state.history.push(snapshot);
  state.viewIndex = state.history.length-1;
  testAnswers = new Array(QUESTIONS.length).fill(0);
  subjectAnswers = new Array(SUBJECTS.length).fill(0);
  state.tab = 'progress';
  render();
}

/* ============ Shared profile block (radar + trend + subjects), reused by student & teacher views ============ */
function renderProfileBlock(history, viewIndex, setterFnName){
  const chips = history.map((h,idx)=>`
    <button class="${idx===viewIndex?'active':''}" onclick="${setterFnName}(${idx})">${esc(h.label || (idx+1)+'차')} · ${fmtDate(h.date)}</button>
  `).join('');
  const snap = history[viewIndex];
  const scores = snap.scores;
  const max = 50;
  const top = topTwoCodes(scores);
  const isLatest = viewIndex === history.length-1;

  let delta = '';
  if(isLatest && history.length>=2){
    const prev = history[history.length-2];
    const diffs = ORDER.map(c=>({c, d:scores[c]-prev.scores[c]})).filter(x=>Math.abs(x.d)>=2).sort((a,b)=>Math.abs(b.d)-Math.abs(a.d));
    delta = `<div class="delta-box"><strong>지난 검사(${esc(prev.label||'이전')}) 대비 변화</strong><br>`;
    delta += diffs.length ? diffs.map(x=>`<span class="delta-tag">${labelOf(x.c)} ${x.d>0?'↑':'↓'} ${x.d>0?'+':''}${x.d}</span>`).join(' ') : '큰 변화 없이 비슷한 흐름을 유지하고 있어요.';
    delta += `</div>`;
  }

  const trend = history.length>=2 ? `
    <div style="margin-top:26px;">
      <div class="section-title" style="font-size:16px;">변화 추이</div>
      <div class="trend-scroll">${trendChartSVG(history)}</div>
      <div class="trend-legend">${CATS.map(c=>`<span><span class="dot" style="background:${c.hex}"></span>${c.label}</span>`).join('')}</div>
    </div>
  ` : `<div class="progress-note" style="margin-top:20px;">검사를 한 번 더 하면 변화 추이 그래프가 나타나요.</div>`;

  const subjSection = snap.subjects ? `
    <div style="margin-top:26px;">
      <div class="section-title" style="font-size:16px;">좋아하는 과목 (${isLatest?'현재':esc(snap.label||'그때')} 기준)</div>
      <div class="radar-wrap">
        ${subjectRadarSVG(snap.subjects)}
        <div class="legend">${subjectLegendRows(snap.subjects)}</div>
      </div>
    </div>
  ` : '';

  return `
    <div class="snap-chips no-print">${chips}</div>
    <div class="section-title" style="margin-top:4px;">${isLatest?'현재 나의 성향':esc(snap.label||'그때의 성향')}</div>
    <div class="section-desc">${snap.grade}학년 ${esc(snap.classSection||'')} · ${fmtDate(snap.date)} 검사 결과예요.</div>
    <div class="radar-wrap">
      ${radarSVG(scores, max)}
      <div class="legend">${CATS.map(c=>`
        <div class="legend-row">
          <span class="dot" style="background:${c.hex}"></span>
          <span class="legend-label">${c.label}</span>
          <span class="legend-bar-track"><span class="legend-bar-fill" style="width:${Math.min(100,scores[c.code]/max*100)}%; background:${c.hex}"></span></span>
          <span class="legend-score">${scores[c.code]}</span>
        </div>`).join('')}
      </div>
    </div>
    ${top ? `<div class="highlight-box">가장 뚜렷하게 나타나는 성향은 <strong>${labelOf(top[0])}</strong>과 <strong>${labelOf(top[1])}</strong>이에요.</div>` : ''}
    ${delta}
    ${subjSection}
    ${trend}
    <div class="no-print" style="margin-top:22px;">
      <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨️ PDF로 저장</button>
      <div class="progress-note" style="margin-top:8px;">인쇄 대화상자가 열리면 '대상'을 PDF로 저장으로 바꿔서 저장하면 돼요.</div>
    </div>
  `;
}

/* ============ Progress tab (student) ============ */
function progressView(){
  if(state.history.length===0){
    return `<div class="card"><div class="empty">아직 검사 기록이 없어요.<br>'검사하기' 탭에서 첫 검사를 해보세요.</div></div>`;
  }
  return `<div class="card">${renderProfileBlock(state.history, state.viewIndex, 'setViewIndex')}</div>`;
}
function setViewIndex(i){ state.viewIndex=i; render(); }

function radarSVG(scores, max){
  const cx=140, cy=140, R=105;
  const angleFor = idx => -Math.PI/2 + idx*(Math.PI*2/6);
  const pt = (idx, r) => [cx + r*Math.cos(angleFor(idx)), cy + r*Math.sin(angleFor(idx))];
  const rings = [0.25,0.5,0.75,1].map(f=>{
    const pts = ORDER.map((_,idx)=>pt(idx, R*f).join(',')).join(' ');
    return `<polygon points="${pts}" fill="none" style="stroke:var(--line)" stroke-width="1"/>`;
  }).join('');
  const axes = ORDER.map((c,idx)=>{ const [x,y]=pt(idx,R); return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" style="stroke:var(--line)" stroke-width="1"/>`; }).join('');
  const dataPts = ORDER.map((c,idx)=>{ const r=Math.max(4,(scores[c]/max)*R); return pt(idx,r); });
  const dataPoly = dataPts.map(p=>p.join(',')).join(' ');
  const dots = ORDER.map((c,idx)=>{ const [x,y]=dataPts[idx]; const cat=CATS.find(x2=>x2.code===c); return `<circle cx="${x}" cy="${y}" r="4.5" fill="${cat.hex}"/>`; }).join('');
  const labels = ORDER.map((c,idx)=>{ const [x,y]=pt(idx,R+22); return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-family="IBM Plex Mono, monospace" font-size="13" font-weight="600" style="fill:var(--ink)">${c}</text>`; }).join('');
  return `<svg class="radar-svg" width="280" height="280" viewBox="0 0 280 280">${rings}${axes}<polygon points="${dataPoly}" style="fill:var(--accent);stroke:var(--accent)" fill-opacity="0.16" stroke-width="2"/>${dots}${labels}</svg>`;
}

function subjectLegendRows(subjects){
  const max = 5;
  return Object.entries(subjects).sort((a,b)=>b[1]-a[1]).map(([name,v])=>`
    <div class="legend-row">
      <span class="dot" style="background:var(--accent)"></span>
      <span class="legend-label legend-label-wide">${esc(name)}</span>
      <span class="legend-bar-track"><span class="legend-bar-fill" style="width:${Math.min(100,v/max*100)}%; background:var(--accent)"></span></span>
      <span class="legend-score">${v}</span>
    </div>
  `).join('');
}
function subjectRadarSVG(subjects){
  const n = SUBJECTS.length;
  const cx=150, cy=150, R=105;
  const angleFor = idx => -Math.PI/2 + idx*(Math.PI*2/n);
  const pt = (idx, r) => [cx + r*Math.cos(angleFor(idx)), cy + r*Math.sin(angleFor(idx))];
  const rings = [0.25,0.5,0.75,1].map(f=>{
    const pts = SUBJECTS.map((_,idx)=>pt(idx, R*f).join(',')).join(' ');
    return `<polygon points="${pts}" fill="none" style="stroke:var(--line)" stroke-width="1"/>`;
  }).join('');
  const axes = SUBJECTS.map((_,idx)=>{ const [x,y]=pt(idx,R); return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" style="stroke:var(--line)" stroke-width="1"/>`; }).join('');
  const dataPts = SUBJECTS.map((name,idx)=>{ const v = subjects[name]||0; const r = Math.max(3,(v/5)*R); return pt(idx,r); });
  const dataPoly = dataPts.map(p=>p.join(',')).join(' ');
  const dots = SUBJECTS.map((name,idx)=>{ const [x,y]=dataPts[idx]; return `<circle cx="${x}" cy="${y}" r="4" fill="var(--accent)"/>`; }).join('');
  const labels = SUBJECTS.map((name,idx)=>{ const [x,y]=pt(idx,R+24); return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-family="IBM Plex Mono, monospace" font-size="10.5" font-weight="600" style="fill:var(--ink)">${esc(name)}</text>`; }).join('');
  return `<svg class="radar-svg" width="320" height="320" viewBox="0 0 300 300">${rings}${axes}<polygon points="${dataPoly}" style="fill:var(--accent);stroke:var(--accent)" fill-opacity="0.16" stroke-width="2"/>${dots}${labels}</svg>`;
}

function trendChartSVG(history){
  const W = 640;
  const H = 220, padL=32, padR=14, padT=14, padB=34;
  const plotW = W-padL-padR, plotH = H-padT-padB;
  const xFor = idx => padL + (history.length===1 ? plotW/2 : idx*(plotW/(history.length-1)));
  const yFor = v => padT + plotH - ((v-10)/40)*plotH;
  const grid = [10,20,30,40,50].map(v=>{
    const y=yFor(v);
    return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" style="stroke:var(--line)" stroke-width="1"/><text x="${padL-6}" y="${y+3}" font-size="9.5" text-anchor="end" font-family="IBM Plex Mono, monospace" style="fill:var(--ink-soft)">${v}</text>`;
  }).join('');
  const lines = CATS.map(cat=>{
    const pts = history.map((h,idx)=>`${xFor(idx)},${yFor(h.scores[cat.code])}`).join(' ');
    return `<polyline points="${pts}" fill="none" style="stroke:${cat.hex}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>`;
  }).join('');
  const xlabels = history.map((h,idx)=>{
    const x = xFor(idx);
    const short = h.label ? h.label.slice(0,8) : fmtDate(h.date).slice(5);
    return `<text x="${x}" y="${H-10}" font-size="9.5" text-anchor="middle" font-family="IBM Plex Mono, monospace" style="fill:var(--ink-soft)">${esc(short)}</text>`;
  }).join('');
  return `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;">${grid}${lines}${xlabels}</svg>`;
}

async function runAnalysis(){
  if(state.isDemo){
    state.analysisError = '샘플 모드에서는 AI 분석을 사용할 수 없어요. 이름·비밀번호로 로그인한 뒤 이용해보세요.';
    render();
    return;
  }
  state.analysisLoading=true; state.analysisError=null; render();
  const res = await apiCall('runAnalysis', {name:state.studentName, password:state.studentPassword});
  state.analysisLoading=false;

  render();
}

function teacherByTypeBody(students){
  if(students.length===0) return `<div class="empty">아직 등록된 학생이 없어요.</div>`;
  const groups = {}; CATS.forEach(c=>{ groups[c.code]=[]; });
  const untested = [];
  students.forEach(s=>{
    const top = s.scores ? topTwoCodes(s.scores) : null;
    if(top) groups[top[0]].push(s); else untested.push(s);
  });
  const columns = CATS.map(c=>{
    const list = groups[c.code];
    return `
      <div class="type-col">
        <div class="type-col-head">${typeIcon(c.code)}<div><h3>${c.label} <span class="count-tag">${c.code}</span></h3><div class="count-tag">${list.length}명</div></div></div>
        <div class="type-col-list">
          ${list.length ? list.map(s=>{
            const prevTop = s.prevScores ? topTwoCodes(s.prevScores) : null;
            const curTop = s.scores ? topTwoCodes(s.scores) : null;
            const changed = prevTop && curTop && prevTop[0] !== curTop[0];
            const badge = changed ? `<span class="change-badge">${prevTop[0]}→${curTop[0]}</span>` : '';
            return `<button class="student-chip" onclick="openTeacherStudent('${esc(s.name)}')"><span>${esc(s.name)}${badge}</span><span class="student-chip-sub">${esc(s.currentClass||'')}</span></button>`;
          }).join('') : `<div class="progress-note">아직 없음</div>`}
        </div>
      </div>
    `;
  }).join('');
  const untestedBlock = untested.length ? `
    <div class="section-title" style="font-size:15px;margin-top:24px;">아직 검사 전 (${untested.length}명)</div>
    <div class="type-col-list">${untested.map(s=>`<button class="student-chip" onclick="openTeacherStudent('${esc(s.name)}')">${esc(s.name)}</button>`).join('')}</div>
  ` : '';
  return `
    <div class="type-cols-grid">${columns}</div>
    ${untestedBlock}
  `;
}

async function resetStudentPassword(name){
  const sure = confirm(`${name} 학생의 비밀번호를 초기화할까요?\n\n초기화하면 그 학생은 다음 로그인 때 이름과 새 비밀번호를 입력해서 다시 등록해야 해요. 그동안 쌓인 검사 기록은 그대로 남아있어요.`);
  if(!sure) return;
  const res = await apiCall('teacherResetPassword', {code: state.teacherCode, name});
  if(!res.ok){ alert(res.error || '초기화에 실패했어요.'); return; }
  alert(`${name} 학생의 비밀번호가 초기화됐어요. 학생에게 다시 로그인해서 새 비밀번호를 만들라고 안내해주세요.`);
}

      <span class="dot" style="background:${c.hex}"></span>
      <span class="legend-label">${c.label}</span>
      <span class="legend-bar-track"><span class="legend-bar-fill" style="width:${Math.min(100,latest.scores[c.code]/max*100)}%; background:${c.hex}"></span></span>
      <span class="legend-score">${latest.scores[c.code]}</span>
    </div>`).join('');


  const trend = history.length>=2 ? `
    <hr class="print-divider">
    <div class="section-title" style="font-size:16px;">변화 추이</div>
    <div class="trend-scroll">${trendChartSVG(history)}</div>
    <div class="trend-legend">${CATS.map(c=>`<span><span class="dot" style="background:${c.hex}"></span>${c.label}</span>`).join('')}</div>
  ` : '';

  const jobCols = top ? top.map((code,idx)=>{
    const cat = CATS.find(c=>c.code===code);
    const info = JOB_INFO[code];
    return `
      <div class="job-col">
        <div class="job-col-head ${idx===0?'':'rank2'}"><span class="rank-num">${idx+1}</span>${typeIcon(code)}<div><h3>${cat.label} <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);">${code}</span></h3><div class="field-tag">직업군 · ${esc(info.field)}</div></div></div>
        <div class="group-label">대표직업</div>
        <div>${info.representative.map(j=>`<span class="chip-static">${esc(j)}</span>`).join('')}</div>
        <div class="group-label">신생직업</div>
        <div>${info.emerging.map(j=>`<span class="chip-static">${esc(j)}</span>`).join('')}</div>
        <div class="group-label">관련직업</div>
        <div>${info.related.map(j=>`<span class="chip-static">${esc(j)}</span>`).join('')}</div>
        <div class="group-label">대학 계열 및 학과</div>
        <div>${info.majors.map(j=>`<span class="chip-static">${esc(j)}</span>`).join('')}</div>
      </div>
    `;
  }).join('') : '';

  const typeRow = `
    <div class="type-row">
      ${CATS.map(c=>{
        const rank = top ? (c.code===top[0] ? 1 : (c.code===top[1] ? 2 : 0)) : 0;
        return `
        <div class="type-card ${rank===1?'rank1':rank===2?'rank2':''}">
          ${rank ? `<span class="rank-ribbon">${rank}순위</span>` : ''}
          ${typeIcon(c.code)}
          <div class="code-line">${c.code}</div>
          <div class="label-line">${c.label}</div>
        </div>`;
      }).join('')}
    </div>
  `;

  const aiSection = analysis ? renderAnalysisResult(analysis)
    : `<p style="font-size:13px;color:var(--ink-soft);">아직 AI 비교 분석을 받지 않았어요. '계열 분석' 탭에서 먼저 분석을 받으면 다음 PDF에는 이 내용도 포함돼요.</p>`;

  return `
    <div class="print-only" id="print-report">
      <div class="print-header">
        <div class="print-school">서산명지중학교</div>
        <div class="print-title">진로 나침반 결과 보고서</div>
        <div class="print-meta">${esc(studentName)} · ${latest.grade}학년 ${esc(latest.classSection||'')} · ${fmtDate(latest.date)}${latest.label?' · '+esc(latest.label):''}</div>
      </div>

      <div class="section-title" style="font-size:16px;">나의 성향</div>
      <div class="radar-wrap">
        ${radarSVG(latest.scores, max)}
        <div class="legend">${legend}</div>
      </div>
      ${top ? `<div class="highlight-box">가장 뚜렷하게 나타나는 성향은 <strong>${labelOf(top[0])}</strong>과 <strong>${labelOf(top[1])}</strong>이에요.</div>` : ''}

      ${latest.subjects ? `<hr class="print-divider"><div class="section-title" style="font-size:16px;">좋아하는 과목</div><div class="radar-wrap">${subjectRadarSVG(latest.subjects)}<div class="legend">${subjectLegendRows(latest.subjects)}</div></div>` : ''}

      ${trend}

      <hr class="print-divider">
      <div class="section-title" style="font-size:16px;">계열 분석</div>
      <div class="suggestion-card">
        <span class="suggestion-tag">${top ? top[0]+top[1] : '—'}</span>
        <div><strong>${suggestion ? suggestion.name : ''}</strong><div style="font-size:13px;color:var(--ink-soft);margin-top:4px;">${suggestion?suggestion.blurb:''}</div></div>
      </div>
      ${typeRow}
      <div class="job-cols">${jobCols}</div>

      <hr class="print-divider">
      <div class="section-title" style="font-size:16px;">AI 심화 비교 분석</div>
      ${aiSection}
    </div>
  `;
}

/* ============ Init ============ */
render();
</script>
</body>
</html>
